# qfs dev stack (t-203060): Postgres + MySQL for developing/verifying the live `/sql` backends.
#
#   podman-compose -f deploy/dev/compose.yml up -d
#   QFS_CONNECTIONS=deploy/dev/connections.qfs qfs run "/sql/pg/widgets |> where active = true |> select name"
#   podman-compose -f deploy/dev/compose.yml down -v
#
# Each service seeds a `widgets` table (common column types) on first init. Passwords are dev-only.
services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: qfs
      POSTGRES_PASSWORD: qfs
      POSTGRES_DB: qfs
    ports:
      - "5432:5432"
    volumes:
      - ./seed/postgres.sql:/docker-entrypoint-initdb.d/seed.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qfs -d qfs"]
      interval: 3s
      timeout: 3s
      retries: 20

  mysql:
    image: docker.io/library/mariadb:11
    environment:
      MARIADB_USER: qfs
      MARIADB_PASSWORD: qfs
      MARIADB_DATABASE: qfs
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./seed/mysql.sql:/docker-entrypoint-initdb.d/seed.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 3s
      timeout: 3s
      retries: 20
